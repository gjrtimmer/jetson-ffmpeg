name: Runner Token Request
description: Request access to register a self-hosted Jetson runner for this project's CI
title: "[Runner] <variant> runner request"
labels: ["runner-request"]
body:
  - type: markdown
    attributes:
      value: |
        Request access to contribute a self-hosted GitHub Actions runner for hardware testing.
        A maintainer will add your GitHub account to the repository's runner group and provide setup instructions.

  - type: input
    id: jetson-model
    attributes:
      label: Jetson model
      description: Which Jetson device will run the runner?
      placeholder: "e.g. Orin NX, AGX Orin, Orin Nano, Xavier NX"
    validations:
      required: true

  - type: input
    id: variant-tag
    attributes:
      label: Proposed variant label
      description: The runner label used alongside "jetson" in the CI matrix
      placeholder: "e.g. orin-nx, agx, nano"
    validations:
      required: true

  - type: input
    id: jetpack-version
    attributes:
      label: JetPack / L4T version
      placeholder: "e.g. JetPack 6.1 / L4T r36.4.0"
    validations:
      required: true

  - type: dropdown
    id: runner-environment
    attributes:
      label: Runner environment
      options:
        - Bare-metal (directly on Jetson OS)
        - Kubernetes (k3s / k8s)
    validations:
      required: true

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: NVIDIA Container Runtime / Docker with nvidia runtime is installed
          required: true
        - label: GPU access verified (nvidia-smi or tegrastats works)
          required: true
        - label: I have read the runner setup guide ([Bare-metal](docs/GITHUB_RUNNER_MANUAL.md) or [Kubernetes](docs/GITHUB_RUNNER_K8S.md))
          required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Any relevant details (network constraints, availability schedule, etc.)
