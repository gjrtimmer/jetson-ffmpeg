# CI pipeline for jetson-ffmpeg (nvmpi library + ffmpeg patches).
#
# Jobs:
#   build     - compile nvmpi library (stubs), no GPU needed
#   patch     - apply ffpatch.sh to each supported ffmpeg version, then build
#   hw-test   - all HW test suites (test/hw-all.sh) on each Jetson variant
#
# Runner label convention:
#   Build and patch jobs run on any available runner (ubuntu-latest or self-hosted).
#   HW test jobs target self-hosted runners with labels: jetson, <variant>
#
# To add a new hardware variant:
#   1. Register a self-hosted runner with labels: jetson, <variant>
#   2. Add the variant to the hw-test matrix below

name: CI

# Automatic triggers are DISABLED. This pipeline requires self-hosted Jetson
# runners plus arm64 l4t-jetpack containers, which GitHub-hosted runners cannot
# provide — so on push/PR it only ever errors. It is therefore manual-only
# (workflow_dispatch) for use on properly configured self-hosted runners.
#
# To re-enable automatic CI, restore:
#   push:
#     branches: [master, main, "feat/**", "fix/**"]
#   pull_request:
#     branches: [master, main]
on:
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Build nvmpi with stubs (any runner)
  # ---------------------------------------------------------------------------
  build:
    name: Build nvmpi
    runs-on: ubuntu-latest
    container:
      image: harbor.local/jetson/l4t-jetpack:r36.4.0
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq --no-install-recommends \
            git build-essential cmake pkg-config yasm nasm wget ca-certificates \
            libv4l-dev libx264-dev libx265-dev libnuma-dev libvpx-dev libopus-dev \
            libmp3lame-dev libvorbis-dev libdav1d-dev libass-dev libfreetype6-dev \
            libgnutls28-dev
          if [ ! -d /usr/src/jetson_multimedia_api ]; then
            apt-get install -y -qq --no-install-recommends nvidia-l4t-jetson-multimedia-api
          fi

      - name: Build nvmpi
        run: |
          mkdir -p build && cd build
          cmake -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/_nvmpi \
                -DCMAKE_BUILD_TYPE=Release -DWITH_STUBS=ON ..
          make -j"$(nproc)"
          make install

      - name: Upload nvmpi artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nvmpi-build
          path: |
            _nvmpi/
            build/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Patch and build ffmpeg (matrix across versions)
  # ---------------------------------------------------------------------------
  patch:
    name: Patch ffmpeg ${{ matrix.ffmpeg }}
    runs-on: ubuntu-latest
    needs: build
    container:
      image: harbor.local/jetson/l4t-jetpack:r36.4.0
    strategy:
      fail-fast: false
      matrix:
        ffmpeg:
          - "release/4.2"
          - "release/4.4"
          - "release/6.0"
          - "release/6.1"
          - "release/7.0"
          - "release/7.1"
          - "release/8.0"
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq --no-install-recommends \
            git build-essential cmake pkg-config yasm nasm wget ca-certificates \
            libv4l-dev libx264-dev libx265-dev libnuma-dev libvpx-dev libopus-dev \
            libmp3lame-dev libvorbis-dev libdav1d-dev libass-dev libfreetype6-dev \
            libgnutls28-dev
          if [ ! -d /usr/src/jetson_multimedia_api ]; then
            apt-get install -y -qq --no-install-recommends nvidia-l4t-jetson-multimedia-api
          fi

      - name: Download nvmpi artifacts
        uses: actions/download-artifact@v4
        with:
          name: nvmpi-build

      - name: Patch and build ffmpeg
        run: |
          echo "=== ffmpeg ${{ matrix.ffmpeg }} ==="
          git clone --depth=1 -b "${{ matrix.ffmpeg }}" https://git.ffmpeg.org/ffmpeg.git /tmp/ffmpeg
          bash ./scripts/ffpatch.sh /tmp/ffmpeg
          cd /tmp/ffmpeg
          export PKG_CONFIG_PATH="${{ github.workspace }}/_nvmpi/lib/pkgconfig:${{ github.workspace }}/_nvmpi/share/pkgconfig"
          ./configure \
            --prefix=${{ github.workspace }}/_ffmpeg \
            --enable-shared --disable-static --disable-doc \
            --enable-gpl --enable-nvmpi \
            --extra-cflags="-I${{ github.workspace }}/include" \
            --extra-ldflags="-L${{ github.workspace }}/build -L${{ github.workspace }}/stubs -Wl,-rpath-link,${{ github.workspace }}/stubs" \
            --enable-libx264 --enable-libx265 --enable-libvpx --enable-libopus \
            --enable-libmp3lame --enable-libvorbis --enable-libdav1d \
            --enable-libass --enable-libfreetype --enable-gnutls
          make -j"$(nproc)"
          make install

      - name: Upload ffmpeg artifacts
        if: matrix.ffmpeg == 'release/8.0'
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-build
          path: _ffmpeg/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # HW test on real Jetson hardware (self-hosted runners)
  # To add a variant: register a runner with labels [self-hosted, jetson, <variant>]
  # and add it to the matrix below.
  # ---------------------------------------------------------------------------
  hw-test:
    name: HW test (${{ matrix.variant }})
    needs: patch
    runs-on: [self-hosted, jetson, "${{ matrix.variant }}"]
    strategy:
      fail-fast: false
      matrix:
        variant:
          - orin-nx
          # - agx
          # - nano
    env:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
    steps:
      - uses: actions/checkout@v4

      - name: Download ffmpeg artifacts
        uses: actions/download-artifact@v4
        with:
          name: ffmpeg-build
          path: _ffmpeg

      - name: Run HW encode/decode test
        env:
          JETSON_VARIANT: ${{ matrix.variant }}
        run: |
          export PATH="${{ github.workspace }}/_ffmpeg/bin:${PATH}"
          export LD_LIBRARY_PATH="${{ github.workspace }}/_ffmpeg/lib:/usr/lib/aarch64-linux-gnu/tegra:${LD_LIBRARY_PATH:-}"
          ldconfig || true
          bash test/hw-all.sh
