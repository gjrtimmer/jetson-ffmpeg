# yaml-language-server: $schema=https://gitlab.com/gitlab-org/gitlab/-/raw/master/app/assets/javascripts/editor/schema/ci.json
#
# CI pipeline for jetson-ffmpeg (nvmpi library + ffmpeg integration).
#
# CI image builds use the docker component from the GitLab catalog:
#   https://gitlab.timmertech.nl/templates/components/docker (arm64 template)
# Buildkit cache is stored in Harbor via $HARBOR_REGISTRY_CACHE.

include:
  - component: gitlab.timmertech.nl/templates/components/docker/arm64@1.13.0
    inputs:
      name: "builder-jp6"
      stage: build
      dockerfile: ci/builder-jp6.Dockerfile
      tag: "harbor.local/jetson/jetson-ffmpeg-builder:${L4T_TAG}"
      tags: "--tag docker.io/${DOCKERHUB_USERNAME}/jetson-ffmpeg-builder:${L4T_TAG}"
      args: "--build-arg=L4T_TAG=$L4T_TAG"
      before:
        - 'echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin'
      cache: true
      cache_tag: "builder-jp6"
      check: false
  - component: gitlab.timmertech.nl/templates/components/docker/arm64@1.13.0
    inputs:
      name: "l4t-jetpack6"
      stage: build
      dockerfile: ci/l4t-jetpack6.Dockerfile
      tag: "harbor.local/jetson/l4t-jetpack6:${L4T_TAG}"
      tags: "--tag docker.io/${DOCKERHUB_USERNAME}/l4t-jetpack6:${L4T_TAG}"
      args: "--build-arg=L4T_TAG=$L4T_TAG"
      before:
        - 'echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin'
      cache: false
      check: false
  - component: gitlab.timmertech.nl/templates/components/docker/arm64@1.13.0
    inputs:
      name: "l4t-jetpack5"
      stage: build
      dockerfile: ci/l4t-jetpack5.Dockerfile
      tag: "harbor.local/jetson/l4t-jetpack5:${L4T_TAG_JP5}"
      tags: "--tag docker.io/${DOCKERHUB_USERNAME}/l4t-jetpack5:${L4T_TAG_JP5}"
      args: "--build-arg=L4T_TAG=$L4T_TAG_JP5"
      before:
        - 'echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin'
      cache: false
      check: false
  - component: gitlab.timmertech.nl/templates/components/docker/arm64@1.13.0
    inputs:
      name: "builder-jp5"
      stage: build
      dockerfile: ci/builder-jp5.Dockerfile
      tag: "harbor.local/jetson/jetson-ffmpeg-builder-jp5:${L4T_TAG_JP5}"
      tags: "--tag docker.io/${DOCKERHUB_USERNAME}/jetson-ffmpeg-builder-jp5:${L4T_TAG_JP5}"
      args: "--build-arg=L4T_TAG=$L4T_TAG_JP5"
      before:
        - 'echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin'
      cache: true
      cache_tag: "builder-jp5"
      check: false
  - component: gitlab.timmertech.nl/templates/components/docker/arm64@1.13.0
    inputs:
      name: "release-tools"
      stage: build
      dockerfile: ci/release-tools.Dockerfile
      tag: "docker.io/${DOCKERHUB_USERNAME}/jetson-ffmpeg-release-tools:latest"
      before:
        - 'echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin'
      cache: true
      cache_tag: "release-tools"
      check: false
#
# Two kinds of pipeline:
#
#   Branch / MR pipelines (NOT a tag, deduplicated — see workflow:rules):
#     build   - compile nvmpi library (stubs) + patch/build each ffmpeg version
#     test    - all HW test suites (test/hw-all.sh) on each Jetson variant
#
#   Tag pipelines (v<X.Y.Z>):  -> see https://github.com/gjrtimmer/jetson-ffmpeg/wiki/Release-Process
#     dist    - build REAL libnvmpi + ffmpeg per version in a plain container
#               (the stub builds above are NOT runnable, so releases rebuild
#               against the real tegra libs, pulled from NVIDIA's apt repo)
#     release - changelog (git-cliff) -> GitLab Release with package assets,
#               and mirror to GitHub (if GITHUB_REPO/GITHUB_TOKEN are set)
#
# Runner tag convention:
#   only test needs real hardware ("jetson" + "<variant>"); build/dist
#   have NO tags (any runner). release runs in the release-tools image (any runner).
#
# To add a new hardware variant:
#   1. Register a project runner with tags: jetson, <variant>
#   2. Add an entry to the shared .hw-test parallel matrix with JETSON_VARIANT
#
# To add a new FFmpeg version:
#   1. Add the version string to the FFVER matrix in ffmpeg:jp6 and ffmpeg:jp5
#   2. Add a test:ffmpeg-<ver>:jp6 job with the matching needs reference
#   3. Add the version to the FFVER matrix in dist:jp6 and dist:jp5

stages:
  - build
  - test
  - dist
  - release

# Pipeline deduplication: when a branch has an open MR, only the MR
# pipeline runs — the branch pipeline is suppressed. Tag pipelines always run.
workflow:
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS'
      when: never
    - if: '$CI_COMMIT_BRANCH'

variables:
  BUILD_IMAGES:
    value: "false"
    description: "Build and push CI Docker images"
    options:
      - "false"
      - "true"
  L4T_TAG: "r36.4.0"
  L4T_SOC: "t234"
  L4T_TAG_JP5: "r35.4.1"
  NVMPI_PREFIX: "${CI_PROJECT_DIR}/_nvmpi"
  FFMPEG_PREFIX: "${CI_PROJECT_DIR}/_ffmpeg"
  BUILDER_IMAGE: "harbor.local/jetson/jetson-ffmpeg-builder:${L4T_TAG}"
  BUILDER_IMAGE_JP5: "harbor.local/jetson/jetson-ffmpeg-builder-jp5:${L4T_TAG_JP5}"
  RELEASE_IMAGE: "harbor.local/docker.io/${DOCKERHUB_USERNAME}/jetson-ffmpeg-release-tools:latest"

# Reusable pipeline rules:
#   .not-on-tag — branch/MR work; skipped on tag pipelines
#   .only-tag   — release work; runs only on v<X.Y.Z> tags
.not-on-tag: &not-on-tag
  rules:
    - if: '$CI_COMMIT_TAG'
      when: never
    - if: '$BUILD_IMAGES == "true"'
      when: never
    - when: on_success
.only-tag: &only-tag
  rules:
    - if: '$BUILD_IMAGES == "true"'
      when: never
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/'

default:
  image:
    name: "${BUILDER_IMAGE}"
    pull_policy: always

# ---------------------------------------------------------------------------
# Stage: build — compile nvmpi (stubs), then patch/build each ffmpeg version
#
# nvmpi:jp6 / nvmpi:jp5 compile libnvmpi against stubs.
# ffmpeg:jp6 / ffmpeg:jp5 clone, patch, configure, and build each FFmpeg
# version via parallel:matrix on FFVER.
# ---------------------------------------------------------------------------
nvmpi:jp6:
  stage: build
  <<: *not-on-tag
  script:
    - mkdir -p build && cd build
    - cmake -DCMAKE_INSTALL_PREFIX="${NVMPI_PREFIX}" -DCMAKE_BUILD_TYPE=Release -DWITH_STUBS=ON ..
    - make -j"$(nproc)"
    - make install
  artifacts:
    paths:
      - _nvmpi/
      - build/
    expire_in: 1 hour

# JetPack 5.x (kernel 5.10) compile-test — catches V4L2 header constants
# and API symbols that exist on JP6 (kernel 5.15+) but not JP5. Stubs-only,
# no FFmpeg, no hw tests. Covers all JP5 releases (5.0.2-5.1.6).
nvmpi:jp5:
  stage: build
  <<: *not-on-tag
  image:
    name: "${BUILDER_IMAGE_JP5}"
    pull_policy: if-not-present
  script:
    - mkdir -p build && cd build
    - cmake -DCMAKE_INSTALL_PREFIX="${NVMPI_PREFIX}" -DCMAKE_BUILD_TYPE=Release -DWITH_STUBS=ON ..
    - make -j"$(nproc)"
    - make install
  artifacts:
    paths:
      - _nvmpi/
      - build/
    expire_in: 1 hour

.ffmpeg-build: &ffmpeg-build
  stage: build
  <<: *not-on-tag
  script:
    - echo "=== ffmpeg ${FFVER} ==="
    - git clone --depth=1 -b "release/${FFVER}" https://git.ffmpeg.org/ffmpeg.git /tmp/ffmpeg
    - bash ./scripts/ffpatch.sh /tmp/ffmpeg
    - cd /tmp/ffmpeg
    - export PKG_CONFIG_PATH="${NVMPI_PREFIX}/lib/pkgconfig:${NVMPI_PREFIX}/share/pkgconfig"
    - |
      # Probe optional codec/protocol libraries — enable whatever is available.
      # Core test target is nvmpi; optional libs are best-effort in patch builds.
      OPT=""
      probe() { if pkg-config --exists "$1" 2>/dev/null; then OPT="${OPT} $2"; fi; }
      probe x264          --enable-libx264
      probe x265          --enable-libx265
      probe vpx           --enable-libvpx
      probe opus          --enable-libopus
      probe 'libmp3lame'  --enable-libmp3lame
      probe vorbis        --enable-libvorbis
      probe 'dav1d >= 1.0.0' --enable-libdav1d
      probe libass        --enable-libass
      probe freetype2     --enable-libfreetype
      probe gnutls        --enable-gnutls
      echo "[i] optional flags:${OPT:- (none)}"
    - >-
      ./configure
      --prefix="${FFMPEG_PREFIX}"
      --enable-shared --disable-static --disable-doc
      --enable-gpl --enable-nvmpi
      --extra-cflags="-I${CI_PROJECT_DIR}/include"
      --extra-ldflags="-L${CI_PROJECT_DIR}/build -L${CI_PROJECT_DIR}/stubs -Wl,-rpath-link,${CI_PROJECT_DIR}/stubs"
      ${OPT}
    - make -j"$(nproc)"
    - make install
    - cp -a ${NVMPI_PREFIX}/lib/libnvmpi* ${FFMPEG_PREFIX}/lib/
  artifacts:
    paths:
      - _ffmpeg/
    expire_in: 1 hour

ffmpeg:jp6:
  <<: *ffmpeg-build
  needs: ["nvmpi:jp6"]
  parallel:
    matrix:
      - FFVER: ["6.0", "6.1", "7.0", "7.1", "8.0", "8.1"]

ffmpeg:jp5:
  <<: *ffmpeg-build
  image:
    name: "${BUILDER_IMAGE_JP5}"
    pull_policy: always
  needs: ["nvmpi:jp5"]
  parallel:
    matrix:
      - FFVER: ["6.0", "6.1", "7.0", "7.1", "8.0", "8.1"]

# ---------------------------------------------------------------------------
# Stage: test — HW encode/decode on real Jetson hardware.
#
# One hw-test job per supported FFmpeg version, each reusing its version's build
# artifact (installed ffmpeg + libnvmpi) — no rebuild on the Jetson runner.
#
# The nvmpi FFmpeg wrapper compiles into a few DISTINCT builds by libavcodec
# version (see "Wrapper code paths by FFmpeg version" in https://github.com/gjrtimmer/jetson-ffmpeg/wiki/Development-Guide#wrapper-code-paths-by-ffmpeg-version):
#
#   6.0,6.1,7.0,7.1 -> path C (FFCodec) — identical wrapper code
#   8.0,8.1          -> path D (FFCodec + AV_PROFILE)
#
# 6.0–7.1 share wrapper code (path C) but are each hw-tested anyway, to also
# cover FFmpeg ABI/runtime differences between those releases.
#
# To add a hardware variant, add it to the matrix and register a runner with
# tags: jetson, <variant>.
# ---------------------------------------------------------------------------
.hw-test: &hw-test
  stage: test
  <<: *not-on-tag
  image:
    name: "harbor.local/jetson/l4t-jetpack6:${L4T_TAG}"
    pull_policy: always
  tags: [jetson, "${JETSON_VARIANT}"]
  # Serialize all Jetson work (one job at a time) so per-version tests
  # don't thrash a single device.
  resource_group: jetson
  parallel:
    matrix:
      - JETSON_VARIANT: orin-nx
      # - JETSON_VARIANT: agx
      # - JETSON_VARIANT: nano
  variables:
    NVIDIA_VISIBLE_DEVICES: "all"
    NVIDIA_DRIVER_CAPABILITIES: "all"
  before_script: []
  script:
    - echo "=== HW test (${CI_JOB_NAME}) on ${JETSON_VARIANT} ==="
    - export PATH="${FFMPEG_PREFIX}/bin:${PATH}"
    - export LD_LIBRARY_PATH="${FFMPEG_PREFIX}/lib:/usr/lib/aarch64-linux-gnu/tegra:${LD_LIBRARY_PATH:-}"
    - ldconfig || true
    - bash test/hw-all.sh

test:ffmpeg-6.0:jp6:                         # path C
  <<: *hw-test
  needs:
    - job: "ffmpeg:jp6"
      parallel:
        matrix:
          - FFVER: "6.0"

test:ffmpeg-6.1:jp6:                         # path C
  <<: *hw-test
  needs:
    - job: "ffmpeg:jp6"
      parallel:
        matrix:
          - FFVER: "6.1"

test:ffmpeg-7.0:jp6:                         # path C
  <<: *hw-test
  needs:
    - job: "ffmpeg:jp6"
      parallel:
        matrix:
          - FFVER: "7.0"

test:ffmpeg-7.1:jp6:                         # path C
  <<: *hw-test
  needs:
    - job: "ffmpeg:jp6"
      parallel:
        matrix:
          - FFVER: "7.1"

test:ffmpeg-8.0:jp6:                         # path D
  <<: *hw-test
  needs:
    - job: "ffmpeg:jp6"
      parallel:
        matrix:
          - FFVER: "8.0"

test:ffmpeg-8.1:jp6:                         # path D
  <<: *hw-test
  needs:
    - job: "ffmpeg:jp6"
      parallel:
        matrix:
          - FFVER: "8.1"

# ---------------------------------------------------------------------------
# Stage: dist — build REAL libnvmpi + ffmpeg per version and tar each one
# (tag pipelines only). The build stages above link stubs and are NOT
# runnable; releases must rebuild against the real Multimedia API.
#
# This is a plain container build on any (arm64) runner — NO Jetson hardware
# is needed: nothing encodes/decodes here, and the `strings` check on
# libavcodec.so verifies nvmpi codecs are compiled in. The real tegra userspace libraries
# (libnvv4l2, libnvjpeg, libnvbufsurface, libnvbufsurftransform) are installed
# from NVIDIA's jetson apt repo; the touch file skips nvidia-l4t-core's
# "must run on an NVIDIA Tegra platform" preinstall check inside containers.
# --no-stubs makes build.sh hard-fail if those libs are missing, so a release
# can never silently ship stub-linked (non-runnable) tarballs.
# Produces dist/jetson-ffmpeg_<ver>_ffmpeg<ff>_l4t<tag>_aarch64.tar.gz.
# ---------------------------------------------------------------------------
.dist:
  stage: dist
  <<: *only-tag
  before_script:
    - mkdir -p /opt/nvidia/l4t-packages && touch /opt/nvidia/l4t-packages/.nv-l4t-disable-boot-fw-update-in-preinstall
    - |
      if ! grep -rqs "repo.download.nvidia.com/jetson/${L4T_SOC}" /etc/apt/sources.list /etc/apt/sources.list.d/; then
        wget -qO /etc/apt/trusted.gpg.d/jetson-ota-public.asc https://repo.download.nvidia.com/jetson/jetson-ota-public.asc
        echo "deb https://repo.download.nvidia.com/jetson/${L4T_SOC} ${L4T_TAG%.*} main" > /etc/apt/sources.list.d/nvidia-l4t-${L4T_SOC}.list
      fi
    - apt-get update -qq
    - >-
      apt-get install -y -qq --no-install-recommends
      nvidia-l4t-multimedia nvidia-l4t-multimedia-utils
    - ldconfig
  script:
    - export VERSION="${CI_COMMIT_TAG#v}"
    - PFX="${CI_PROJECT_DIR}/_pkg"
    - |
      OPT=""
      probe() { if pkg-config --exists "$1" 2>/dev/null; then OPT="${OPT} $2"; fi; }
      probe x264          --enable-libx264
      probe x265          --enable-libx265
      probe vpx           --enable-libvpx
      probe opus          --enable-libopus
      probe 'libmp3lame'  --enable-libmp3lame
      probe vorbis        --enable-libvorbis
      probe 'dav1d >= 1.0.0' --enable-libdav1d
      probe 'libass >= 0.11.0' --enable-libass
      probe freetype2     --enable-libfreetype
      probe gnutls        --enable-gnutls
      echo "[i] optional flags:${OPT:- (none)}"
    - >-
      bash ./scripts/build.sh --no-stubs --no-libx264 --no-libx265
      --ffmpeg "${FFVER}" --install
      --prefix "${PFX}" --ffmpeg-prefix "${PFX}" -j"$(nproc)"
      --ffmpeg-args "--enable-shared --disable-static --enable-gpl ${OPT}"
    - test -f "${PFX}/lib/libnvmpi.so"
    - strings "${PFX}/lib/libavcodec.so" | grep -qE 'h264_nvmpi|hevc_nvmpi'
    - >-
      bash ./scripts/package.sh --prefix "${PFX}" --version "${VERSION}"
      --ffmpeg-version "${FFVER}" --l4t "${L4T_TAG}" --outdir "${CI_PROJECT_DIR}/dist"
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

dist:jp6:
  extends: .dist
  parallel:
    matrix:
      - FFVER: ["6.0", "6.1", "7.0", "7.1", "8.0", "8.1"]

dist:jp5:
  extends: .dist
  image:
    name: "${BUILDER_IMAGE_JP5}"
    pull_policy: always
  variables:
    L4T_TAG: "${L4T_TAG_JP5}"
    L4T_SOC: "t194"
  parallel:
    matrix:
      - FFVER: ["6.0", "6.1", "7.0", "7.1", "8.0", "8.1"]

# ---------------------------------------------------------------------------
# Stage: release — changelog + S3 upload + GitLab Release (+ generic package
# assets). Runs in the release-tools image from DockerHub
# (rebuilt weekly by scheduled pipeline). Tag pipelines only.
#
# S3/MinIO CI variables (masked, project-level):
#   S3_HOST, S3_CLIENT_ID, S3_CLIENT_SECRET, S3_BUCKET
# ---------------------------------------------------------------------------
release:
  stage: release
  <<: *only-tag
  image:
    name: "${RELEASE_IMAGE}"
    pull_policy: always
  needs:
    - job: "dist:jp6"
    - job: "dist:jp5"
  variables:
    GIT_DEPTH: "0"   # full history + tags for git-cliff
  before_script:
    - |
      echo "[i] installing mc (MinIO client)"
      curl -fsSL https://dl.min.io/client/mc/release/linux-arm64/mc -o /usr/local/bin/mc
      chmod +x /usr/local/bin/mc
      mc --version
  script:
    - git fetch --tags --force || true
    - bash ./scripts/release.sh

# ---------------------------------------------------------------------------
# Docker image build overrides — rules for component-generated jobs.
#
# The docker component (included above) creates docker:builder-jp6,
# docker:l4t-jetpack6, etc. We override their rules so images are ONLY
# built when BUILD_IMAGES=true (pipeline UI dropdown or scheduled).
# Dockerfile changes alone do NOT trigger builds — the images are large
# and slow; rebuild explicitly when ready.
#
# Buildkit cache: enabled via component inputs; cache images stored in
# $HARBOR_REGISTRY_CACHE/$CI_PROJECT_PATH:<cache_tag>.
# Requires CI vars: DOCKER_AUTH_CONFIG, DOCKERHUB_USERNAME, DOCKERHUB_TOKEN.
# ---------------------------------------------------------------------------
docker:builder-jp6:
  image:
    name: "${DOCKER_HUB_PROXY}/docker:28.2.2-cli"
    pull_policy: always
  rules:
    - if: '$CI_COMMIT_TAG'
      when: never
    - if: '$BUILD_IMAGES == "true"'
    - when: never

docker:l4t-jetpack6:
  image:
    name: "${DOCKER_HUB_PROXY}/docker:28.2.2-cli"
    pull_policy: always
  rules:
    - if: '$CI_COMMIT_TAG'
      when: never
    - if: '$BUILD_IMAGES == "true"'
    - when: never

docker:l4t-jetpack5:
  image:
    name: "${DOCKER_HUB_PROXY}/docker:28.2.2-cli"
    pull_policy: always
  rules:
    - if: '$CI_COMMIT_TAG'
      when: never
    - if: '$BUILD_IMAGES == "true"'
    - when: never

docker:builder-jp5:
  image:
    name: "${DOCKER_HUB_PROXY}/docker:28.2.2-cli"
    pull_policy: always
  rules:
    - if: '$CI_COMMIT_TAG'
      when: never
    - if: '$BUILD_IMAGES == "true"'
    - when: never

docker:release-tools:
  image:
    name: "${DOCKER_HUB_PROXY}/docker:28.2.2-cli"
    pull_policy: always
  rules:
    - if: '$CI_COMMIT_TAG'
      when: never
    - if: '$BUILD_IMAGES == "true"'
    - when: never
