# yaml-language-server: $schema=https://gitlab.com/gitlab-org/gitlab/-/raw/master/app/assets/javascripts/editor/schema/ci.json
#
# CI pipeline for jetson-ffmpeg (nvmpi library + ffmpeg patches).
#
# Two kinds of pipeline:
#
#   Branch / MR pipelines (NOT a tag):
#     build   - compile nvmpi library (stubs) on any runner
#     patch   - apply ffpatch.sh to each supported ffmpeg version, build ffmpeg
#     test    - HW encode/decode smoke test on each Jetson variant
#
#   Tag pipelines (v<X.Y.Z>):  -> see docs/RELEASE.md
#     package - build REAL libnvmpi + ffmpeg per version on Jetson and tar each
#               (the stub builds above are NOT runnable, so releases rebuild)
#     release - changelog (git-cliff) -> GitLab Release with package assets,
#               and mirror to GitHub (if GITHUB_REPO/GITHUB_TOKEN are set)
#
# Runner tag convention:
#   build/patch have NO tags (any runner); test + package need real hardware
#   ("jetson" + "<variant>"). release runs in the release-tools image (any runner).
#
# To add a new hardware variant:
#   1. Register a project runner with tags: jetson, <variant>
#   2. Add an entry to the shared .hw-test parallel matrix with JETSON_VARIANT

stages:
  - build
  - patch
  - test
  - package
  - release

variables:
  L4T_TAG: "r36.4.0"
  NVMPI_PREFIX: "${CI_PROJECT_DIR}/_nvmpi"
  FFMPEG_PREFIX: "${CI_PROJECT_DIR}/_ffmpeg"
  # release-tools image lives in Harbor (this instance's registry convention),
  # under a distinct sub-path so it never collides with the project's own image.
  RELEASE_IMAGE: "${HARBOR_REGISTRY}/${CI_PROJECT_PATH}/release-tools:latest"

# Reusable pipeline rules:
#   .not-on-tag — branch/MR work; skipped on tag pipelines
#   .only-tag   — release work; runs only on v<X.Y.Z> tags
.not-on-tag: &not-on-tag
  rules:
    - if: '$CI_COMMIT_TAG'
      when: never
    - when: on_success
.only-tag: &only-tag
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/'

default:
  image:
    name: nvcr.io/nvidia/l4t-jetpack:${L4T_TAG}
    pull_policy: if-not-present
  before_script:
    - apt-get update -qq
    - >-
      apt-get install -y -qq --no-install-recommends
      git build-essential cmake pkg-config yasm nasm wget ca-certificates
      libv4l-dev libx264-dev libx265-dev libnuma-dev libvpx-dev libopus-dev
      libmp3lame-dev libvorbis-dev libdav1d-dev libass-dev libfreetype6-dev
      libgnutls28-dev
    - |
      if [ ! -d /usr/src/jetson_multimedia_api ]; then
        apt-get install -y -qq --no-install-recommends nvidia-l4t-jetson-multimedia-api
      fi

# ---------------------------------------------------------------------------
# Stage: build — compile nvmpi with stubs (any runner)
# ---------------------------------------------------------------------------
build:nvmpi:
  stage: build
  <<: *not-on-tag
  script:
    - mkdir -p build && cd build
    - cmake -DCMAKE_INSTALL_PREFIX="${NVMPI_PREFIX}" -DCMAKE_BUILD_TYPE=Release -DWITH_STUBS=ON ..
    - make -j"$(nproc)"
    - make install
  artifacts:
    paths:
      - _nvmpi/
      - build/
    expire_in: 1 hour

# ---------------------------------------------------------------------------
# Stage: patch — clone each ffmpeg version, patch, configure, and build
# ---------------------------------------------------------------------------
.patch-and-build: &patch-and-build
  stage: patch
  needs: ["build:nvmpi"]
  <<: *not-on-tag
  script:
    - echo "=== ffmpeg ${FFMPEG_BRANCH} ==="
    - git clone --depth=1 -b "${FFMPEG_BRANCH}" https://git.ffmpeg.org/ffmpeg.git /tmp/ffmpeg
    - bash ./scripts/ffpatch.sh /tmp/ffmpeg
    - cd /tmp/ffmpeg
    - export PKG_CONFIG_PATH="${NVMPI_PREFIX}/lib/pkgconfig:${NVMPI_PREFIX}/share/pkgconfig"
    - >-
      ./configure
      --prefix="${FFMPEG_PREFIX}"
      --enable-shared --disable-static --disable-doc
      --enable-gpl --enable-nvmpi
      --extra-cflags="-I${CI_PROJECT_DIR}/include"
      --extra-ldflags="-L${CI_PROJECT_DIR}/build -L${CI_PROJECT_DIR}/stubs -Wl,-rpath-link,${CI_PROJECT_DIR}/stubs"
      --enable-libx264 --enable-libx265 --enable-libvpx --enable-libopus
      --enable-libmp3lame --enable-libvorbis --enable-libdav1d
      --enable-libass --enable-libfreetype --enable-gnutls
    - make -j"$(nproc)"
    - make install
    - cp -a ${NVMPI_PREFIX}/lib/libnvmpi* ${FFMPEG_PREFIX}/lib/
  artifacts:
    paths:
      - _ffmpeg/
    expire_in: 1 hour

patch:ffmpeg-4.2:
  <<: *patch-and-build
  variables:
    FFMPEG_BRANCH: "release/4.2"

patch:ffmpeg-4.4:
  <<: *patch-and-build
  variables:
    FFMPEG_BRANCH: "release/4.4"

patch:ffmpeg-6.0:
  <<: *patch-and-build
  variables:
    FFMPEG_BRANCH: "release/6.0"

patch:ffmpeg-6.1:
  <<: *patch-and-build
  variables:
    FFMPEG_BRANCH: "release/6.1"

patch:ffmpeg-7.0:
  <<: *patch-and-build
  variables:
    FFMPEG_BRANCH: "release/7.0"

patch:ffmpeg-7.1:
  <<: *patch-and-build
  variables:
    FFMPEG_BRANCH: "release/7.1"

patch:ffmpeg-8.0:
  <<: *patch-and-build
  variables:
    FFMPEG_BRANCH: "release/8.0"

# ---------------------------------------------------------------------------
# Stage: test — HW encode/decode on real Jetson hardware.
#
# One hw-test job per supported FFmpeg version, each reusing its version's patch
# artifact (installed ffmpeg + libnvmpi) — no rebuild on the Jetson runner.
#
# The nvmpi FFmpeg wrapper compiles into a few DISTINCT builds by libavcodec
# version (see "Wrapper code paths by FFmpeg version" in docs/DEVELOPMENT.md):
#
#   4.2           -> path A (old AVCodec, old encode API)
#   4.4           -> path B (old AVCodec, new receive_packet API)
#   6.0,6.1,7.0,7.1 -> path C (FFCodec) — identical wrapper code
#   8.0           -> path D (FFCodec + AV_PROFILE)
#
# 6.0–7.1 share wrapper code (path C) but are each hw-tested anyway, to also
# cover FFmpeg ABI/runtime differences between those releases.
#
# To add a hardware variant, add it to the matrix and register a runner with
# tags: jetson, <variant>.
# ---------------------------------------------------------------------------
.hw-test: &hw-test
  stage: test
  <<: *not-on-tag
  tags: [jetson, "${JETSON_VARIANT}"]
  # Serialize all Jetson work (one job at a time) so per-version builds/tests
  # don't thrash a single device — see also .package.
  resource_group: jetson
  parallel:
    matrix:
      - JETSON_VARIANT: orin-nx
      # - JETSON_VARIANT: agx
      # - JETSON_VARIANT: nano
  variables:
    NVIDIA_VISIBLE_DEVICES: "all"
    NVIDIA_DRIVER_CAPABILITIES: "all"
  before_script: []
  script:
    - echo "=== HW test (${CI_JOB_NAME}) on ${JETSON_VARIANT} ==="
    - export PATH="${FFMPEG_PREFIX}/bin:${PATH}"
    - export LD_LIBRARY_PATH="${FFMPEG_PREFIX}/lib:/usr/lib/aarch64-linux-gnu/tegra:${LD_LIBRARY_PATH:-}"
    - ldconfig || true
    - bash test/hw-test.sh

test:hw-ffmpeg-4.2:           # path A
  <<: *hw-test
  needs: ["patch:ffmpeg-4.2"]

test:hw-ffmpeg-4.4:           # path B
  <<: *hw-test
  needs: ["patch:ffmpeg-4.4"]

test:hw-ffmpeg-6.0:           # path C
  <<: *hw-test
  needs: ["patch:ffmpeg-6.0"]

test:hw-ffmpeg-6.1:           # path C
  <<: *hw-test
  needs: ["patch:ffmpeg-6.1"]

test:hw-ffmpeg-7.0:           # path C
  <<: *hw-test
  needs: ["patch:ffmpeg-7.0"]

test:hw-ffmpeg-7.1:           # path C
  <<: *hw-test
  needs: ["patch:ffmpeg-7.1"]

test:hw-ffmpeg-8.0:           # path D
  <<: *hw-test
  needs: ["patch:ffmpeg-8.0"]

# ---------------------------------------------------------------------------
# Stage: package — build REAL libnvmpi + ffmpeg on a Jetson and tar each
# version (tag pipelines only). The build/patch stages above link stubs and are
# NOT runnable; releases must rebuild against the real Multimedia API.
# Produces dist/jetson-ffmpeg_<ver>_ffmpeg<ff>_l4t<tag>_aarch64.tar.gz.
# ---------------------------------------------------------------------------
# NOTE: package jobs use `extends:` (not the YAML `<<` merge) so that each job's
# `variables: {FFVER}` DEEP-merges with the NVIDIA_* vars below (a `<<` merge
# would replace the whole variables map and drop them). The NVIDIA_* vars expose
# the tegra libraries so build.sh links REAL libnvmpi (not stubs).
.package:
  stage: package
  <<: *only-tag
  tags: [jetson]
  # One build at a time on the Jetson (each build already uses -j$(nproc)).
  # Shared group with .hw-test so nothing else hammers the device concurrently.
  resource_group: jetson
  variables:
    NVIDIA_VISIBLE_DEVICES: "all"
    NVIDIA_DRIVER_CAPABILITIES: "all"
  script:
    - export VERSION="${CI_COMMIT_TAG#v}"
    - PFX="${CI_PROJECT_DIR}/_pkg"
    - >-
      bash ./scripts/build.sh --ffmpeg "${FFVER}" --install
      --prefix "${PFX}" --ffmpeg-prefix "${PFX}" -j"$(nproc)"
      --ffmpeg-args "--enable-shared --disable-static --enable-libx265 --enable-libvpx
      --enable-libopus --enable-libmp3lame --enable-libvorbis --enable-libdav1d
      --enable-libass --enable-libfreetype --enable-gnutls"
    - LD_LIBRARY_PATH="${PFX}/lib:/usr/lib/aarch64-linux-gnu/tegra" "${PFX}/bin/ffmpeg" -hide_banner -encoders 2>/dev/null | grep -E 'h264_nvmpi|hevc_nvmpi'
    - >-
      bash ./scripts/package.sh --prefix "${PFX}" --version "${VERSION}"
      --ffmpeg-version "${FFVER}" --l4t "${L4T_TAG}" --outdir "${CI_PROJECT_DIR}/dist"
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

package:ffmpeg-4.2: { extends: .package, variables: { FFVER: "4.2" } }
package:ffmpeg-4.4: { extends: .package, variables: { FFVER: "4.4" } }
package:ffmpeg-6.0: { extends: .package, variables: { FFVER: "6.0" } }
package:ffmpeg-6.1: { extends: .package, variables: { FFVER: "6.1" } }
package:ffmpeg-7.0: { extends: .package, variables: { FFVER: "7.0" } }
package:ffmpeg-7.1: { extends: .package, variables: { FFVER: "7.1" } }
package:ffmpeg-8.0: { extends: .package, variables: { FFVER: "8.0" } }

# ---------------------------------------------------------------------------
# Stage: release — changelog + GitLab Release (+ generic package assets), then
# mirror to GitHub. Runs in the pinned release-tools image (build it once via
# the manual build:release-image job below). Tag pipelines only.
# ---------------------------------------------------------------------------
release:
  stage: release
  <<: *only-tag
  image:
    name: "${RELEASE_IMAGE}"
    pull_policy: always
  needs:
    - "package:ffmpeg-4.2"
    - "package:ffmpeg-4.4"
    - "package:ffmpeg-6.0"
    - "package:ffmpeg-6.1"
    - "package:ffmpeg-7.0"
    - "package:ffmpeg-7.1"
    - "package:ffmpeg-8.0"
  variables:
    GIT_DEPTH: "0"   # full history + tags for git-cliff
  before_script: []
  script:
    - git fetch --tags --force || true
    - bash ./scripts/release.sh

# ---------------------------------------------------------------------------
# Bootstrap: build + push the release-tools image to Harbor.
#
# Mirrors this instance's image-build convention (the docker/arm64 CI component):
# docker buildx against the remote buildkit backend, registry auth from
# $DOCKER_AUTH_CONFIG, pushed to $HARBOR_REGISTRY. We replicate the mechanism in
# one job (rather than `include:`-ing the component) because that component sets
# a global stages list + a docker-CLI default image, which would clash with this
# pipeline's l4t-based build/patch/test/package jobs.
#
# Run this once before the first release, and whenever ci/release-tools.Dockerfile
# changes (it auto-runs on default-branch changes to that file; also manual).
# Requires the group CI vars: HARBOR_REGISTRY, DOCKER_HUB_PROXY, DOCKER_AUTH_CONFIG.
# ---------------------------------------------------------------------------
build:release-image:
  stage: build
  image:
    name: "${DOCKER_HUB_PROXY}/docker:28.2.2-cli"
    pull_policy: always
  # no tags -> the k8s-executor default runner (which reaches the buildkit backend)
  variables:
    DOCKER_CLI_EXPERIMENTAL: enabled
    BUILDKIT_BUILDER_ID: "${CI_PROJECT_NAME}_${CI_JOB_ID}_builder"
  rules:
    - if: '$CI_COMMIT_TAG'
      when: never
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        paths: ["ci/release-tools.Dockerfile"]
    - when: manual
      allow_failure: true
  before_script:
    - mkdir -p "$HOME/.docker"; cat "$DOCKER_AUTH_CONFIG" > "$HOME/.docker/config.json"
    - docker buildx create --use --driver remote --name "$BUILDKIT_BUILDER_ID" tcp://buildkit.coding.svc:1234
  after_script:
    - docker buildx rm "$BUILDKIT_BUILDER_ID" --force || true
  script:
    - >-
      docker buildx build --push --provenance=false --platform=linux/arm64
      --build-arg=DOCKER_HUB_PROXY="$DOCKER_HUB_PROXY"
      --file ci/release-tools.Dockerfile
      --tag "${RELEASE_IMAGE}" .
