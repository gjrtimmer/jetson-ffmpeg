# git-cliff configuration — generates the release changelog from Conventional
# Commits between the previous tag and the current one.
# Docs: https://git-cliff.org
[changelog]
header = "# Changelog\n\n"
body = """
{% if version %}## {{ version | trim_start_matches(pat="v") }} - {{ timestamp | date(format="%Y-%m-%d") }}\
{% else %}## Unreleased\
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | upper_first }}{% if commit.scope %} ({{ commit.scope }}){% endif %}\
{% endfor %}
{% endfor %}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9]*"
topo_order = false
sort_commits = "oldest"
# Map commit types to changelog sections.
commit_parsers = [
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactor" },
    { message = "^docs", group = "Documentation" },
    { message = "^test", group = "Testing" },
    { message = "^ci", group = "CI" },
    { message = "^build", group = "Build" },
    { message = "^chore", group = "Chores" },
    { message = "^style", group = "Styling" },
    { body = ".*security", group = "Security" },
    { message = "^merge", skip = true },
    { message = "^Merge", skip = true },
    { message = "^Revert", group = "Reverts" },
    { message = ".*", group = "Other" },
]
