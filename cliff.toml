# git-cliff configuration — generates the release changelog from Conventional
# Commits between the previous tag and the current one.
# Docs: https://git-cliff.org
[changelog]
header = "# Changelog\n\n"
body = """
{% if version %}## {{ version | trim_start_matches(pat="v") }} - {{ timestamp | date(format="%Y-%m-%d") }}\
{% else %}## Unreleased\
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for scope, scoped_commits in commits | group_by(attribute="scope") %}
{% if scope %}
**{{ scope }}**
{% endif %}
{% for commit in scoped_commits %}
- {{ commit.message | upper_first }}\
{% endfor %}
{% endfor %}
{% endfor %}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9]*"
topo_order = false
sort_commits = "oldest"
# Map commit types to changelog sections.
commit_parsers = [
    # Skip internal/non-user-facing commits
    { message = ".*\\(retro\\)", skip = true },
    { message = "^chore", skip = true },
    { message = "^style", skip = true },
    { message = "^ci", skip = true },
    { message = "^docs", skip = true },
    { message = "^merge", skip = true },
    { message = "^Merge", skip = true },
    # User-facing changes only
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactor" },
    { message = "^build", group = "Build" },
    { message = "^test", group = "Testing" },
    { body = ".*security", group = "Security" },
    { message = "^Revert", group = "Reverts" },
    # Catch-all: skip anything not explicitly grouped
    { message = ".*", skip = true },
]
